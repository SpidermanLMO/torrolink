# Netlify configuration for Torrolink

[build]
  publish = "."
  command = "npm install"
  functions = "netlify/functions"
  # Only deploy when actual site/function files change.
  # Changes to schema.sql, STATUS.md, etc. will NOT trigger a deploy.
  ignore = "git diff --quiet HEAD^ HEAD -- netlify/ index.html netlify.toml package.json script.js styles.css success.html terms.html privacy.html"

# Security headers for all routes
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# Aggressive caching for static assets (they're content-hashed by filename)
[[headers]]
  for = "/styles.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/script.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/favicon.svg"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# Images and fonts
[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[redirects]]
  from = "/p/:handle"
  to = "/.netlify/functions/profile"
  status = 200

[[redirects]]
  from = "/q/:code"
  to = "/.netlify/functions/qr"
  status = 200

[[redirects]]
  from = "/design/:code"
  to = "/.netlify/functions/design-portal"
  status = 200

[[redirects]]
  from = "/admin"
  to = "/.netlify/functions/admin"
  status = 200

[[redirects]]
  from = "/contact"
  to = "/.netlify/functions/contact"
  status = 200

[[redirects]]
  from = "/portal"
  to = "/.netlify/functions/portal"
  status = 200

[[redirects]]
  from = "/portal-save"
  to = "/.netlify/functions/portal-save"
  status = 200

[[redirects]]
  from = "/metrics/:handle"
  to = "/.netlify/functions/metrics"
  status = 200

[[redirects]]
  from = "/vcard"
  to = "/.netlify/functions/vcard"
  status = 200

[[redirects]]
  from = "/terms"
  to = "/terms.html"
  status = 200

[[redirects]]
  from = "/privacy"
  to = "/privacy.html"
  status = 200

[[redirects]]
  from = "/success"
  to = "/success.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
