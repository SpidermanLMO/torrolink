# Netlify configuration for Torrolink

[build]
  publish = "."
  command = "npm install"
  functions = "netlify/functions"
  # Only deploy when actual site/function files change.
  # Changes to schema.sql, STATUS.md, etc. will NOT trigger a deploy.
  ignore = "git diff --quiet HEAD^ HEAD -- netlify/ index.html netlify.toml package.json script.js styles.css success.html"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[redirects]]
  from = "/p/:handle"
  to = "/.netlify/functions/profile"
  status = 200

[[redirects]]
  from = "/q/:code"
  to = "/.netlify/functions/qr"
  status = 200

[[redirects]]
  from = "/design/:code"
  to = "/.netlify/functions/design-portal"
  status = 200

[[redirects]]
  from = "/admin"
  to = "/.netlify/functions/admin"
  status = 200

[[redirects]]
  from = "/portal"
  to = "/.netlify/functions/portal"
  status = 200

[[redirects]]
  from = "/portal-save"
  to = "/.netlify/functions/portal-save"
  status = 200

[[redirects]]
  from = "/metrics/:handle"
  to = "/.netlify/functions/metrics"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
