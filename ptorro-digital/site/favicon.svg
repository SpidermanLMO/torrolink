<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="PTorro Digital">
  <!-- dark rounded tile (brand black) -->
  <rect width="64" height="64" rx="13" fill="#0b0f0e"/>
  <!-- crest shield: deep teal with gold edge -->
  <path d="M32 7 L53 14.5 V32 C53 44.5 43.8 52.8 32 57 C20.2 52.8 11 44.5 11 32 V14.5 Z"
        fill="#0A3F3F" stroke="#C9A227" stroke-width="2.6" stroke-linejoin="round"/>
  <!-- inner gold hairline -->
  <path d="M32 11.5 L49 17.7 V32 C49 42.5 41.2 49.6 32 53.2 C22.8 49.6 15 42.5 15 32 V17.7 Z"
        fill="none" stroke="#C9A227" stroke-width="0.9" opacity="0.55"/>
  <!-- center divider with circuit nodes (the digital cue) -->
  <line x1="32" y1="13.5" x2="32" y2="53" stroke="#C9A227" stroke-width="1.7"/>
  <circle cx="32" cy="21" r="2.4" fill="#C9A227"/>
  <circle cx="32" cy="33" r="2.4" fill="#C9A227"/>
  <circle cx="32" cy="45" r="2.4" fill="#C9A227"/>
  <!-- horn hint (left = bull) -->
  <path d="M22 30 q-3 -4 -1.5 -8 q3 3 3.5 8 Z M26 30 q3 -4 1.5 -8 q-3 3 -3.5 8 Z" fill="#C9A227" opacity="0.92"/>
  <!-- ear hint (right = wolf) -->
  <path d="M39.5 30 l1.8 -6 l2.4 5 Z M43.5 30 l2.4 -5.5 l1.6 6 Z" fill="#C9A227" opacity="0.92"/>
</svg>
